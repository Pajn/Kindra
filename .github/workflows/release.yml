name: Release

'on':
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: kindra-x86_64-unknown-linux-musl.tgz
          - os: macos-26
            target: aarch64-apple-darwin
            archive: kindra-aarch64-apple-darwin.tgz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: kindra-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        if: runner.os != 'Windows'
        env:
          ARCHIVE: ${{ matrix.archive }}
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/kin dist/kin
          tar -C dist -czf "$ARCHIVE" kin

      - name: Package archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE: ${{ matrix.archive }}
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kin.exe" "dist/kin.exe"
          Push-Location dist
          Compress-Archive -Path kin.exe -DestinationPath "../$env:ARCHIVE"
          Pop-Location

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: build-release-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
